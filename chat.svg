<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 160" width="900" height="160">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1f2937"/>
    </pattern>
  </defs>

  <rect width="900" height="160" fill="url(#bg)" rx="16"/>
  <rect width="900" height="160" fill="url(#dots)" rx="16"/>
  <rect x="0" y="0" width="900" height="3" fill="url(#line)" rx="1.5"/>

  <circle cx="860" cy="25" r="5" fill="#3fb950">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="870" y="29" font-family="monospace" font-size="11" fill="#8b949e">active</text>

  <text x="30" y="45" font-family="monospace" font-size="14" fill="#8b949e">
    <tspan fill="#58a6ff">ayush@github</tspan>
    <tspan fill="#8b949e">:</tspan>
    <tspan fill="#ffa657">~</tspan>
    <tspan fill="#8b949e">$ </tspan>
    <tspan>cat profile.txt</tspan>
  </text>

  <text x="30" y="82" font-family="monospace" font-size="28" fill="#e6edf3" font-weight="bold">
    Ayush Dixit
  </text>

  <text x="30" y="118" font-family="monospace" font-size="18">
    <tspan fill="#7ee787">Backend Developer</tspan>
    <tspan fill="#8b949e"> · </tspan>
    <tspan fill="#d2a8ff">Node.js</tspan>
    <tspan fill="#8b949e"> &amp; </tspan>
    <tspan fill="#d2a8ff">Java</tspan>
  </text>
</svg>
