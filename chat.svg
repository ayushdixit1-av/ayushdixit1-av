<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 180" width="900" height="180">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff"/>
      <stop offset="100%" stop-color="#bc8cff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="dots" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#1f2937"/>
    </pattern>
  </defs>

  <rect width="900" height="180" fill="url(#bg)" rx="16"/>
  <rect width="900" height="180" fill="url(#dots)" rx="16"/>

  <!-- Decorative top line -->
  <rect x="0" y="0" width="900" height="3" fill="url(#line)" rx="1.5"/>

  <!-- Status dot -->
  <circle cx="860" cy="25" r="5" fill="#3fb950">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
  <text x="870" y="29" font-family="monospace" font-size="11" fill="#8b949e">active</text>

  <!-- Terminal line 1 -->
  <text x="30" y="45" font-family="'Fira Code', 'JetBrains Mono', monospace" font-size="14" fill="#8b949e">
    <tspan>$ </tspan>
    <tspan fill="#58a6ff">cat</tspan>
    <tspan fill="#ffa657"> about-ayush.txt</tspan>
  </text>

  <!-- Terminal line 2 - Name -->
  <text x="30" y="80" font-family="'Fira Code', monospace" font-size="28" fill="#e6edf3" font-weight="bold">
    Ayush Dixit
  </text>

  <!-- Terminal line 3 - Role -->
  <text x="30" y="115" font-family="'Fira Code', monospace" font-size="18">
    <tspan fill="#7ee787">Backend Developer</tspan>
    <tspan fill="#8b949e"> · </tspan>
    <tspan fill="#d2a8ff">Node.js</tspan>
    <tspan fill="#8b949e"> &amp; </tspan>
    <tspan fill="#d2a8ff">Java</tspan>
  </text>

  <!-- Terminal line 4 - Tagline with typing effect -->
  <text x="30" y="148" font-family="'Fira Code', monospace" font-size="14">
    <tspan fill="#8b949e">$ </tspan>
    <tspan fill="#ffa657">./build.sh</tspan>
    <tspan fill="#8b949e"> --stack</tspan>
    <tspan fill="#c9d1d9"> node.js</tspan>
    <tspan fill="#8b949e">,</tspan>
    <tspan fill="#c9d1d9"> java</tspan>
    <tspan fill="#8b949e">,</tspan>
    <tspan fill="#c9d1d9"> spring boot</tspan>
    <tspan fill="#8b949e">,</tspan>
    <tspan fill="#c9d1d9"> docker</tspan>
    <tspan fill="#8b949e">,</tspan>
    <tspan fill="#c9d1d9"> postgres</tspan>
    <tspan fill="#8b949e" class="cursor" style="animation:blink 0.8s step-end infinite">▊</tspan>
  </text>

  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .cursor { animation: blink 0.8s step-end infinite; }
  </style>

  <!-- Corner decorations -->
  <path d="M15 50 L15 70" stroke="#30363d" stroke-width="2"/>
  <path d="M15 50 L30 50" stroke="#30363d" stroke-width="2"/>
  <path d="M885 130 L885 165" stroke="#30363d" stroke-width="2"/>
  <path d="M870 165 L885 165" stroke="#30363d" stroke-width="2"/>
</svg>
